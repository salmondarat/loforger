name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip release')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install git-cliff
        run: |
          curl -LO https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz
          tar xzf git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz
          sudo mv git-cliff-2.7.0/git-cliff /usr/local/bin/
          rm -rf git-cliff-2.7.0 git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz

      - name: Generate changelog
        id: changelog
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md --verbose
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          git-cliff --config cliff.toml --strip header >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update changelog [skip release]"
          git push

      - name: Determine version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
